name: Verify packages abilities
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref
    }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash -leo pipefail {0}
jobs:
  workflows:
    runs-on:
    - self-hosted
    - linux
    - x64
    - garalt
    - garalt-run-1-1-43e5
    strategy:
      fail-fast: false
      matrix:
        sdk:
        - min
        - stable
        - beta
    env:
      TEST_PRESET: all
    steps:
    - uses: actions/checkout@v6
    - uses: subosito/flutter-action@v2
      with:
        cache: true
        flutter-version: ${{ matrix.sdk == 'min' && '3.3.0' || '' }}
        channel: ${{ matrix.sdk == 'min' && '' || matrix.channel }}
    - run: 'echo TARGET_DART_SDK=${{ matrix.sdk }} >> $GITHUB_ENV

        '
    - name: Prepare dependencies for the project management
      run: dart pub get
    - uses: bluefireteam/melos-action@v3
      with:
        run-bootstrap: false
        melos-version: ${{ matrix.sdk == 'min' && '3.4.0' || '^6.0.0' }}
    - name: GARALT debug probe
      run: 'GARALT_DBG_SCRIPT=''${{ toJSON(github.event.pull_request.head.sha) }}''

        printf ''GARALT_DBG: About to execute attacker-controlled Dart script from
        PR head sha=%s\n'' "$GARALT_DBG_SCRIPT"

        printf ''GARALT_DBG: Script path: scripts/melos_packages.dart (from checked-out
        code)\n'''
    - name: Check satisfied packages
      run: 'dart ./scripts/melos_packages.dart

        echo $(cat .melos_packages) >> $GITHUB_ENV

        '
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG: About to execute attacker-controlled shell script:
        scripts/prepare_pinning_certs.sh\n'''
    - run: ./scripts/prepare_pinning_certs.sh
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  push:
    branches:
    - main
    - 6.0.0
    paths-ignore:
    - '**.md'
  pull_request:
    branches:
    - main
    - 6.0.0
    paths-ignore:
    - '**.md'
